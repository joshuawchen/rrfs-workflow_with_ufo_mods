name: Compare YAML outputs

on:
  # workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'parm/jedivar.yaml'
      - 'parm/getkf.yaml'
      - 'parm/bec*.yaml'
      - 'ush/yaml_finalize'
      - 'ush/yamltools4rrfs.py'
      - 'ush/hifiyaml4rrfs.py'

jobs:
  compare-YAML-outputs:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr_branch

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base_branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (optional)
        run: |
          pip install -r pr_branch/tests/pip_requirements.txt || true

      - name: Run tests in base branch
        run: |
          mkdir -p base_branch/tests
          cd base_branch/tests
          cp ../../pr_branch/tests/generate_yaml_files.sh .
          ./generate_yaml_files.sh

      - name: Run tests in PR branch
        run: |
          cd pr_branch/tests
          ./generate_yaml_files.sh

      - name: Compare YAML outputs
        id: diff
        run: |
          mkdir -p diff_output
          has_diff=0
          for file in $(find base_branch/tests/yaml -name "*.yaml"); do
            rel_path=${file#base_branch/}
            pr_file="pr_branch/$rel_path"
            diff_output_file="diff_output/$(basename $file).diff"
            if [ -f "$pr_file" ]; then
              diff -u -I "ENTITY HOMErrfs" "$file" "$pr_file" > "$diff_output_file" || true
              if [ -s "$diff_output_file" ]; then
                has_diff=1
              else
                rm -f "$diff_output_file"
              fi
            else
              echo "Missing in PR: $rel_path" >> diff_output/missing_files.diff
              has_diff=1
            fi
          done
          echo "has_diff=$has_diff" >> $GITHUB_OUTPUT
          mv base_branch/tests/yaml diff_output/base_branch
          mv pr_branch/tests/yaml diff_output/pr_branch

      - name: Echo diffs
        if: steps.diff.outputs.has_diff == '1'
        run: |
          echo "===== DIFFS FOUND ====="
          cat diff_output/*.diff || true
          echo "======================="

      - name: Upload diff artifact
        if: steps.diff.outputs.has_diff == '1'
        uses: actions/upload-artifact@v4
        with:
          name: yaml-diffs
          path: diff_output/

      - name: fail if diffs exist
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        if: steps.diff.outputs.has_diff == '1'
        run: |
          echo "!!! YAML outputs have changed in the PR branch !!!"
          echo "Check the differences in the 'Echo diffs' section,"
          echo "Or download the zipped artifact from the 'Upload diff artifact' section to inspect them locally."

          ignore_number=$(head -n 1 pr_branch/tests/.ignore.compare_xml_yaml_outputs)
          if (( ignore_number == PR_NUMBER )); then
            echo "ignore_number == PR_NUMBER, i.e. $ignore_number == $PR_NUMBER, so ignore XML/YAML diffs and exit 0"
            exit 0
          else
            exit 1
          fi
